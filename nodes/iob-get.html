<script type="text/javascript">
function loadSharedTreeView() {
    return new Promise((resolve, reject) => {
        if (window.ioBrokerSharedTreeView && window.ioBrokerSharedTreeView.initialized) {
            resolve();
            return;
        }
        
        const script = document.createElement('script');
        script.src = 'iobroker/shared/iobroker-treeview.js?v=1.0.0';
        script.async = true;
        
        script.onload = () => {
            if (window.ioBrokerSharedTreeView && window.ioBrokerSharedTreeView.initialized) {
                resolve();
            } else {
                reject(new Error('TreeView component failed to initialize'));
            }
        };
        
        script.onerror = () => {
            reject(new Error('TreeView component script not found'));
        };
        
        document.head.appendChild(script);
    });
}

RED.nodes.registerType('iobget', {
    category: 'ioBroker WS',
    color: '#a6bbcf',
    defaults: {
        name: { value: "" },
        state: { value: "" },
        outputProperty: { value: "payload" },
        server: { value: "", type: "iob-config" }
    },
    inputs: 1,
    outputs: 1,
    icon: "iobroker_inout.svg",
    paletteLabel: "WS ioB get",
    label: function() {
        return this.name || "iob-get";
    },
    
    oneditprepare: function() {
        const serverInput = $('#node-input-server');
        
        if (!this.server || this.server === '') {
            const configNodes = [];
            RED.nodes.eachConfig(function(config) {
                if (config.type === 'iob-config') {
                    configNodes.push(config);
                }
            });
            
            if (configNodes.length === 1) {
                this.server = configNodes[0].id;
                serverInput.val(this.server);
                
                setTimeout(() => {
                    RED.notify(RED._("iobget.notification.autoSelected", {server: configNodes[0].name || configNodes[0].iobhost}), {
                        type: "info",
                        timeout: 1500
                    });
                }, 500);
            }
        }
        
        loadSharedTreeView().then(() => {
            this.treeController = window.ioBrokerSharedTreeView.setup({
                nodeType: 'iobget',
                inputId: 'node-input-state',
                serverInputId: 'node-input-server',
                searchPlaceholder: RED._("iobget.treeview.searchPlaceholder"),
                itemType: 'states',
                dataEndpoint: '/iobroker/ws/states',
                enableWildcardDetection: false
            });
        }).catch(error => {
            const fallbackMessage = $(`
                <div style="margin-top: 5px; padding: 8px; background-color: #fff3cd; border-radius: 4px; font-size: 12px; color: #856404;">
                    <i class="fa fa-exclamation-triangle"></i> TreeView component not available. Manual input only.
                </div>
            `);
            $('#node-input-state').after(fallbackMessage);
        });
    },

    oneditsave: function() {
        if (this.treeController) {
            this.treeController.cleanup();
        }
    }
});
</script>

<script type="text/html" data-template-name="iobget">
    <div class="form-row">
        <label for="node-input-name"><i class="icon-tag"></i> <span data-i18n="iobget.label.name">Name</span></label>
        <input type="text" id="node-input-name" data-i18n="[placeholder]iobget.placeholder.name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-state"><i class="icon-tag"></i> <span data-i18n="iobget.label.state">State</span></label>
        <input type="text" id="node-input-state" data-i18n="[placeholder]iobget.placeholder.state" placeholder="e.g. 0_userdata.0.test (if empty, msg.topic is used)">
    </div>
    <div class="form-row">
        <label for="node-input-outputProperty"><i class="icon-tag"></i> <span data-i18n="iobget.label.outputProperty">Output Property</span></label>
        <input type="text" id="node-input-outputProperty" data-i18n="[placeholder]iobget.placeholder.outputProperty" placeholder="e.g. payload">
    </div>
    <div class="form-row">
        <label for="node-input-server"><i class="icon-tag"></i> <span data-i18n="iobget.label.server">Server</span></label>
        <input type="text" id="node-input-server">
    </div>
</script>
