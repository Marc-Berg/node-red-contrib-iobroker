<script type="text/javascript">
RED.nodes.registerType('iobget', {
    category: 'ioBroker WS',
    color: '#a6bbcf',
    defaults: {
        name: { value: "" },
        state: { value: "" },
        outputProperty: { value: "payload" },
        server: { value: "", type: "iob-config" }
    },
    inputs: 1,
    outputs: 1,
    icon: "iobroker_inout.svg",
    paletteLabel: "WS ioB get",
    label: function() {
        return this.name || "iob-get";
    },
    
    oneditprepare: function() {
        // Debug: Test i18n functionality
        console.log("=== i18n Debug ===");
        console.log("Browser language:", navigator.language);
        console.log("RED._() available:", typeof RED._);
        console.log("Test key 'iobget.label.name':", RED._("iobget.label.name"));
        console.log("Test key 'iobget.placeholder.state':", RED._("iobget.placeholder.state"));
        console.log("==================");
        
        const serverInput = $('#node-input-server');
        
        if (!this.server || this.server === '') {
            const configNodes = [];
            RED.nodes.eachConfig(function(config) {
                if (config.type === 'iob-config') {
                    configNodes.push(config);
                }
            });
            
            if (configNodes.length === 1) {
                this.server = configNodes[0].id;
                serverInput.val(this.server);
                
                setTimeout(() => {
                    RED.notify(RED._("iobget.notification.autoSelected", {server: configNodes[0].name || configNodes[0].iobhost}), {
                        type: "info",
                        timeout: 1500
                    });
                }, 500);
            }
        }
    }
});
</script>

<script type="text/html" data-template-name="iobget">
    <div class="form-row">
        <label for="node-input-name"><i class="icon-tag"></i> <span data-i18n="iobget.label.name">FALLBACK-Name</span></label>
        <input type="text" id="node-input-name" data-i18n="[placeholder]iobget.placeholder.name" placeholder="FALLBACK-Name">
    </div>
    <div class="form-row">
        <label for="node-input-state"><i class="icon-tag"></i> <span data-i18n="iobget.label.state">FALLBACK-State</span></label>
        <input type="text" id="node-input-state" data-i18n="[placeholder]iobget.placeholder.state" placeholder="FALLBACK: e.g. 0_userdata.0.test (if empty, msg.topic is used)">
    </div>
    <div class="form-row">
        <label for="node-input-outputProperty"><i class="icon-tag"></i> <span data-i18n="iobget.label.outputProperty">FALLBACK-Output Property</span></label>
        <input type="text" id="node-input-outputProperty" data-i18n="[placeholder]iobget.placeholder.outputProperty" placeholder="FALLBACK: e.g. payload">
    </div>
    <div class="form-row">
        <label for="node-input-server"><i class="icon-tag"></i> <span data-i18n="iobget.label.server">FALLBACK-Server</span></label>
        <input type="text" id="node-input-server">
    </div>
</script>

<script type="text/html" data-help-name="iobget">
    <p data-i18n="iobget.help.description">FALLBACK: ioBroker state getter via WebSocket.</p>
    
    <h3 data-i18n="iobget.help.configuration">FALLBACK: Configuration</h3>
    <ul>
        <li><b data-i18n="iobget.label.state">FALLBACK: State</b>: <span data-i18n="iobget.help.stateDescription">FALLBACK: The ioBroker state ID. If empty, msg.topic is used as the state ID.</span></li>
    </ul>
</script>
