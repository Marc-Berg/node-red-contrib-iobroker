<script type="text/javascript">
// Shared TreeView loader
function loadSharedTreeView() {
    return new Promise((resolve, reject) => {
        if (window.ioBrokerSharedTreeView && window.ioBrokerSharedTreeView.initialized) {
            resolve();
            return;
        }
        
        const script = document.createElement('script');
        script.src = 'iobroker/shared/iobroker-treeview.js?v=1.0.0';
        script.async = true;
        
        script.onload = () => {
            if (window.ioBrokerSharedTreeView && window.ioBrokerSharedTreeView.initialized) {
                resolve();
            } else {
                reject(new Error('TreeView component failed to initialize'));
            }
        };
        
        script.onerror = () => reject(new Error('TreeView component script not found'));
        document.head.appendChild(script);
    });
}

RED.nodes.registerType('iobhistory', {
    category: 'ioBroker WS',
    color: '#a6bbcf',
    defaults: {
        name: { value: "" },
        stateId: { value: "" },
        historyAdapter: { value: "history.0" },
        timeRange: { value: "duration" },
        duration: { value: 24 },
        durationUnit: { value: "hours" },
        startTime: { value: "" },
        endTime: { value: "" },
        aggregate: { value: "onchange" },
        step: { value: 300 },
        stepUnit: { value: "seconds" },
        maxEntries: { value: 2000 },
        queryMode: { value: "parallel" }, // parallel, sequential, drop
        outputProperty: { value: "payload" },
        outputFormat: { value: "array" },
        percentile: { value: 50 },
        quantile: { value: 0.5 },
        integralUnit: { value: 3600 },
        server: { value: "", type: "iob-config" }
    },
    inputs: 1,
    outputs: 1,
    icon: "iobroker_history.svg",
    paletteLabel: "WS ioB history",
    label: function() {
        if (this.name) return this.name;
        
        const timeInfo = this.timeRange === 'duration' 
            ? `${this.duration}${this.durationUnit.charAt(0)}`
            : this.timeRange === 'absolute' ? 'abs' : 'msg';
            
        return `${this.stateId || 'history'} (${timeInfo}, ${this.aggregate})`;
    },
    
    oneditprepare: function() {
        const node = this;
        const serverInput = $('#node-input-server');
        
        // Tab switching functionality
        function initializeTabs() {
            $('.node-config-tabs li').on('click', function() {
                const tabId = $(this).data('tab');
                
                // Update active tab
                $('.node-config-tabs li').removeClass('active');
                $(this).addClass('active');
                
                // Show corresponding tab content
                $('.tab-content .tab-pane').removeClass('active');
                $(`.tab-content .tab-pane[data-tab="${tabId}"]`).addClass('active');
            });
            
            // Activate first tab by default
            $('.node-config-tabs li:first').addClass('active');
            $('.tab-content .tab-pane:first').addClass('active');
        }
        
        function showDefaultAdapterSuggestions() {
            $('.adapter-list').html('<span style="color: #6c757d; font-style: italic;">Loading available adapters...</span>');
            $('.adapter-suggestions').show();
        }
        
        function loadHistoryAdapters() {
            const serverNode = RED.nodes.node(serverInput.val());
            if (!serverNode) {
                console.log('No server node selected for history adapter discovery');
                return;
            }
            
            const serverId = `${serverNode.iobhost}:${serverNode.iobport}`;
            console.log('Loading history adapters from:', serverId);
            
            $.ajax({
                url: `/iobroker/ws/adapters/${encodeURIComponent(serverId)}`,
                method: 'GET',
                timeout: 15000,
                dataType: 'json',
                cache: false
            }).done((response) => {
                console.log('History adapters response:', response);
                
                if (response.adapters && response.adapters.length > 0) {
                    const adapters = response.adapters;
                    
                    const adapterButtons = adapters.map(adapter => {
                        const statusClass = adapter.alive ? 'alive' : (adapter.enabled ? 'enabled' : 'disabled');
                        const statusIcon = adapter.alive ? '🟢' : (adapter.enabled ? '🟡' : '🔴');
                        const title = `${adapter.title || adapter.name} - ${adapter.alive ? 'Running' : adapter.enabled ? 'Enabled but not running' : 'Disabled'}`;
                        
                        return `<a href="#" data-adapter="${adapter.name}" class="${statusClass}" title="${title}">${statusIcon} ${adapter.name}</a>`;
                    }).join('');
                    
                    const fallbacks = ['history.0', 'sql.0', 'influxdb.0'].filter(name => 
                        !adapters.find(a => a.name === name)
                    ).map(name => 
                        `<a href="#" data-adapter="${name}" class="fallback" title="Common adapter (not verified)">${name}</a>`
                    ).join('');
                    
                    $('.adapter-list').html(adapterButtons + fallbacks);
                    
                    $('.adapter-list a').on('click', function(e) {
                        e.preventDefault();
                        const adapter = $(this).data('adapter');
                        $('#node-input-historyAdapter').val(adapter);
                        $(this).addClass('selected').siblings().removeClass('selected');
                        return false;
                    });
                    
                    const currentAdapter = $('#node-input-historyAdapter').val();
                    $(`.adapter-list a[data-adapter="${currentAdapter}"]`).addClass('selected');
                    
                    $('.adapter-suggestions').show();
                    console.log(`Found ${adapters.length} history adapters on ${serverId}`);
                } else {
                    console.log('No history adapters found, keeping default suggestions');
                }
            }).fail((xhr, status, error) => {
                console.error('Failed to load history adapters:', status, error);
                
                const fallbackAdapters = ['history.0', 'sql.0', 'influxdb.0', 'history.1', 'sql.1', 'influxdb.1'];
                $('.adapter-list').html(
                    '<span style="color: #dc3545; margin-right: 10px;">⚠️ Could not load from server</span>' +
                    fallbackAdapters.map(adapter => 
                        `<a href="#" data-adapter="${adapter}" class="fallback" title="Common adapter (not verified)">${adapter}</a>`
                    ).join('')
                );
                
                $('.adapter-list a').on('click', function(e) {
                    e.preventDefault();
                    const adapter = $(this).data('adapter');
                    $('#node-input-historyAdapter').val(adapter);
                    $(this).addClass('selected').siblings().removeClass('selected');
                    return false;
                });
            });
        }
        
        function initializeHistoryAdapterSuggestions() {
            // Show default suggestions immediately
            showDefaultAdapterSuggestions();
            
            // Try to load from server if available
            setTimeout(() => {
                loadHistoryAdapters();
            }, 1000);
            
            // Reload adapters when server changes
            serverInput.on('change', () => {
                console.log('Server changed, reloading history adapters...');
                $('.adapter-suggestions').hide();
                setTimeout(() => {
                    showDefaultAdapterSuggestions();
                    setTimeout(loadHistoryAdapters, 500);
                }, 100);
            });
        }
        
        // Initialize tabs
        initializeTabs();
        
        // Auto-select server configuration
        if (!node.server || node.server === '') {
            const configNodes = [];
            RED.nodes.eachConfig(function(config) {
                if (config.type === 'iob-config') {
                    configNodes.push(config);
                }
            });
            
            if (configNodes.length === 1) {
                node.server = configNodes[0].id;
                serverInput.val(node.server);
                
                setTimeout(() => {
                    RED.notify(`Automatically selected server: ${configNodes[0].name || configNodes[0].iobhost}`, {
                        type: "info",
                        timeout: 1500
                    });
                }, 500);
            }
        }
        
        // Time range mode handlers
        $('input[name="timeRangeMode"]').on('change', function() {
            const mode = $(this).val();
            $('.time-config-section').hide();
            $(`.time-config-section.${mode}`).show();
            $('#node-input-timeRange').val(mode);
        });
        
        // Initialize time range mode
        const currentMode = node.timeRange || 'duration';
        $(`input[name="timeRangeMode"][value="${currentMode}"]`).prop('checked', true);
        $('.time-config-section').hide();
        $(`.time-config-section.${currentMode}`).show();
        
        // Aggregation change handler
        $('#node-input-aggregate').on('change', function() {
            const aggregate = $(this).val();
            const stepConfig = $('#step-config');
            const needsStep = ['average', 'min', 'max', 'total', 'count', 'percentile', 'quantile', 'integral'].includes(aggregate);
            
            if (needsStep) {
                stepConfig.show();
            } else {
                stepConfig.hide();
            }
            
            // Show/hide special options
            $('.aggregate-option').hide();
            if (aggregate === 'percentile') {
                $('#percentile-config').show();
            } else if (aggregate === 'quantile') {
                $('#quantile-config').show();
            } else if (aggregate === 'integral') {
                $('#integral-config').show();
            }
        });
        
        // Initialize aggregation
        $('#node-input-aggregate').trigger('change');
        
        // Output format change handler
        $('#node-input-outputFormat').on('change', function() {
            const format = $(this).val();
            $('.output-format-info').hide();
            $(`.output-format-info.${format}`).show();
        });
        
        // Output format change handler
        $('#node-input-outputFormat').on('change', function() {
            const format = $(this).val();
            $('.output-format-info').hide();
            $(`.output-format-info.${format}`).show();
        });
        
        // Query mode change handler
        $('#node-input-queryMode').on('change', function() {
            const mode = $(this).val();
            const infoElement = $('#query-mode-info');
            let infoText = '';
            
            switch(mode) {
                case 'parallel':
                    infoText = '<i class="fa fa-info-circle"></i> <strong>Parallel:</strong> Multiple queries can run simultaneously. Fast but may overload the history adapter with many requests.';
                    break;
                case 'sequential':
                    infoText = '<i class="fa fa-clock-o"></i> <strong>Sequential:</strong> Queries are processed one after another in order. Slower but ensures reliable processing of all requests.';
                    break;
                case 'drop':
                    infoText = '<i class="fa fa-filter"></i> <strong>Drop:</strong> New queries are discarded while one is running. Best for UI updates where only the latest result matters.';
                    break;
            }
            
            infoElement.html(infoText);
        });
        
        // Initialize output format
        $('#node-input-outputFormat').trigger('change');
        
        // Initialize query mode
        $('#node-input-queryMode').trigger('change');
        
        // History adapter suggestions
        initializeHistoryAdapterSuggestions();
        
        // Load TreeView component
        loadSharedTreeView().then(() => {
            node.treeController = window.ioBrokerSharedTreeView.setup({
                nodeType: 'iobhistory',
                inputId: 'node-input-stateId',
                serverInputId: 'node-input-server',
                searchPlaceholder: 'Search states for history...',
                itemType: 'states',
                dataEndpoint: '/iobroker/ws/states',
                enableWildcardDetection: false
            });
        }).catch(error => {
            console.error('Failed to load TreeView component:', error);
        });
    },

    oneditsave: function() {
        if (this.treeController) {
            this.treeController.cleanup();
        }
    }
});
</script>

<script type="text/html" data-template-name="iobhistory">
    <style>

            list-style: none;
            padding: 0;
            margin: 0 0 15px 0;
            display: flex;
            border-bottom: 2px solid #ddd;
            background: linear-gradient(to bottom, #f8f9fa, #e9ecef);
            border-radius: 6px 6px 0 0;

            text-align: center;

            padding: 12px 8px;
            background: #f8f9fa;

            font-weight: 500;
            font-size: 13px;
        }

        }

            border-right: none;
            border-radius: 0 6px 0 0;
        }

            background: #e2e6ea;
        }
        
        .node-config-tabs li.active {
            background: white;
            color: #007bff;
            border-bottom: 2px solid #007bff;
            font-weight: 600;
        }
        
        .tab-content {
            min-height: 400px;
        }
        
        .tab-pane {
            display: none;
        }
        
        .tab-pane.active {
            display: block;
        }
        
        .tab-section {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .tab-section h4 {
            margin: 0 0 12px 0;
            color: #495057;
            font-size: 14px;
            font-weight: 600;
            border-bottom: 1px solid #dee2e6;
            padding-bottom: 6px;
        }
        
        .form-row {
            margin-bottom: 12px;
        }
        
        .form-row:last-child {
            margin-bottom: 0;
        }
        
        .adapter-suggestions {
            margin-top: 8px;
            padding: 8px;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            font-size: 12px;
        }
        .adapter-suggestions a {
            display: inline-block;
            margin: 2px 8px 2px 0;
            padding: 4px 8px;
            background-color: #e9ecef;
            border: 1px solid #ced4da;
            border-radius: 3px;
            text-decoration: none;
            color: #495057;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .adapter-suggestions a:hover {
            background-color: #007bff;
            border-color: #007bff;
            color: white;
        }
        .adapter-suggestions a.selected {
            background-color: #28a745;
            border-color: #28a745;
            color: white;
        }
        .adapter-suggestions a.alive {
            background-color: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }
        .adapter-suggestions a.enabled {
            background-color: #fff3cd;
            border-color: #ffeaa7;
            color: #856404;
        }
        .adapter-suggestions a.disabled {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
            opacity: 0.7;
        }
        .adapter-suggestions a.fallback {
            background-color: #f8f9fa;
            border-color: #dee2e6;
            color: #6c757d;
            border-style: dashed;
        }
        
        .time-range-options {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 10px;
            margin-top: 8px;
        }
        
        .time-range-options label {
            font-weight: normal;
            margin-right: 15px;
        }
        
        .output-format-info {
            margin-top: 8px;
            padding: 8px;
            background-color: #e8f4fd;
            border: 1px solid #bee5eb;
            border-radius: 4px;
            font-size: 12px;
            color: #0c5460;
        }
    </style>

    <!-- Basic Info -->
    <div class="form-row">
        <label for="node-input-name"><i class="icon-tag"></i> <span data-i18n="iobhistory.label.name">Name</span></label>
        <input type="text" id="node-input-name" data-i18n="[placeholder]iobhistory.placeholder.name" placeholder="Optional node name">
    </div>

    <!-- Tab Navigation -->
    <ul class="node-config-tabs">
        <li data-tab="datasource"><span data-i18n="iobhistory.tabs.datasource">📊 Data Source</span></li>
        <li data-tab="timerange"><span data-i18n="iobhistory.tabs.timerange">🕐 Time Range</span></li>
        <li data-tab="processing"><span data-i18n="iobhistory.tabs.processing">⚙️ Processing</span></li>
        <li data-tab="output"><span data-i18n="iobhistory.tabs.output">📤 Output</span></li>
    </ul>

    <!-- Tab Content -->
    <div class="tab-content">
        <!-- Data Source Tab -->
        <div class="tab-pane" data-tab="datasource">
            <div class="tab-section">
                <h4 data-i18n="iobhistory.sections.stateConfig">State Configuration</h4>
                <div class="form-row">
                    <label for="node-input-stateId"><i class="icon-tag"></i> <span data-i18n="iobhistory.label.stateId">State ID</span></label>
                    <input type="text" id="node-input-stateId" data-i18n="[placeholder]iobhistory.placeholder.stateId" placeholder="e.g. system.adapter.admin.0.memRss (if empty, msg.topic is used)">
                </div>
            </div>
            
            <div class="tab-section">
                <h4 data-i18n="iobhistory.sections.historyAdapterConfig">History Adapter</h4>
                <div class="form-row">
                    <label for="node-input-historyAdapter"><i class="icon-tag"></i> <span data-i18n="iobhistory.label.historyAdapter">Adapter Instance</span></label>
                    <input type="text" id="node-input-historyAdapter" data-i18n="[placeholder]iobhistory.placeholder.historyAdapter" placeholder="e.g. history.0, sql.1, influxdb.2">
                    <div class="adapter-suggestions" style="display: none;">
                        <span style="font-size: 12px; color: #666;" data-i18n="iobhistory.info.adapters">Available adapters: </span>
                        <span class="adapter-list" style="font-size: 12px;"></span>
                    </div>
                </div>
            </div>
            
            <div class="tab-section">
                <h4 data-i18n="iobhistory.sections.serverConnection">Server Connection</h4>
                <div class="form-row">
                    <label for="node-input-server"><i class="icon-tag"></i> <span data-i18n="iobhistory.label.server">ioBroker Server</span></label>
                    <input type="text" id="node-input-server">
                </div>
            </div>
        </div>

        <!-- Time Range Tab -->
        <div class="tab-pane" data-tab="timerange">
            <div class="tab-section">
                <h4 data-i18n="iobhistory.sections.timeRangeMode">Time Range Mode</h4>
                <div class="time-range-options">
                    <label><input type="radio" name="timeRangeMode" value="duration"> <span data-i18n="iobhistory.options.timeRange.duration">Duration from now</span></label>
                    <label><input type="radio" name="timeRangeMode" value="absolute"> <span data-i18n="iobhistory.options.timeRange.absolute">Absolute time period</span></label>
                    <label><input type="radio" name="timeRangeMode" value="message"> <span data-i18n="iobhistory.options.timeRange.message">From message properties</span></label>
                </div>
                <input type="hidden" id="node-input-timeRange">
            </div>
            
            <!-- Duration Configuration -->
            <div class="time-config-section duration">
                <div class="tab-section">
                    <h4 data-i18n="iobhistory.sections.durationSettings">Duration Settings</h4>
                    <div class="form-row">
                        <label for="node-input-duration"><i class="icon-clock-o"></i> <span data-i18n="iobhistory.label.duration">Duration</span></label>
                        <input type="number" id="node-input-duration" style="width: 100px;" min="1">
                        <select id="node-input-durationUnit" style="width: 100px; margin-left: 5px;">
                            <option value="minutes" data-i18n="iobhistory.options.durationUnit.minutes">Minutes</option>
                            <option value="hours" data-i18n="iobhistory.options.durationUnit.hours">Hours</option>
                            <option value="days" data-i18n="iobhistory.options.durationUnit.days">Days</option>
                            <option value="weeks" data-i18n="iobhistory.options.durationUnit.weeks">Weeks</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <!-- Absolute Time Configuration -->
            <div class="time-config-section absolute">
                <div class="tab-section">
                    <h4 data-i18n="iobhistory.sections.absoluteTime">Absolute Time Period</h4>
                    <div class="form-row">
                        <label for="node-input-startTime"><i class="icon-calendar"></i> <span data-i18n="iobhistory.label.startTime">Start Time</span></label>
                        <input type="datetime-local" id="node-input-startTime" style="width: 200px;">
                    </div>
                    <div class="form-row">
                        <label for="node-input-endTime"><i class="icon-calendar"></i> <span data-i18n="iobhistory.label.endTime">End Time</span></label>
                        <input type="datetime-local" id="node-input-endTime" style="width: 200px;">
                    </div>
                </div>
            </div>
            
            <!-- Message Configuration Info -->
            <div class="time-config-section message">
                <div class="tab-section">
                    <h4 data-i18n="iobhistory.sections.messageProperties">Message Properties</h4>
                    <div style="color: #0c5460; font-size: 13px;">
                        <i class="fa fa-info-circle"></i> <span data-i18n="iobhistory.info.messageProperties">Time range will be read from message properties:</span>
                        <ul style="margin: 8px 0 0 20px;">
                            <li><code>msg.start</code> - <span data-i18n="iobhistory.info.messagePropertiesList.0">Start timestamp (ISO string or milliseconds)</span></li>
                            <li><code>msg.end</code> - <span data-i18n="iobhistory.info.messagePropertiesList.1">End timestamp (ISO string or milliseconds)</span></li>
                            <li><code>msg.duration</code> - <span data-i18n="iobhistory.info.messagePropertiesList.2">Duration in hours (alternative to end)</span></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <!-- Processing Tab -->
        <div class="tab-pane" data-tab="processing">
            <div class="tab-section">
                <h4 data-i18n="iobhistory.sections.queryProcessing">Query Processing</h4>
                <div class="form-row">
                    <label for="node-input-queryMode"><i class="icon-cogs"></i> <span data-i18n="iobhistory.label.queryMode">Query Mode</span></label>
                    <select id="node-input-queryMode" style="width:100%">
                        <option value="parallel" data-i18n="iobhistory.options.queryMode.parallel">Parallel - Allow multiple simultaneous queries</option>
                        <option value="sequential" data-i18n="iobhistory.options.queryMode.sequential">Sequential - Queue queries and process one by one</option>
                        <option value="drop" data-i18n="iobhistory.options.queryMode.drop">Drop - Discard new queries while one is running</option>
                    </select>
                    <div id="query-mode-info" style="margin-top: 8px; padding: 8px; background-color: #e8f4fd; border: 1px solid #bee5eb; border-radius: 4px; font-size: 12px; color: #0c5460;">
                        <!-- Dynamic info will be populated here -->
                    </div>
                </div>
            </div>
            
            <div class="tab-section">
                <h4 data-i18n="iobhistory.sections.dataAggregation">Data Aggregation</h4>
                <div class="form-row">
                    <label for="node-input-aggregate"><i class="icon-cog"></i> <span data-i18n="iobhistory.label.aggregate">Aggregation Method</span></label>
                    <select id="node-input-aggregate" style="width:100%">
                        <option value="none" data-i18n="iobhistory.options.aggregate.none">None (Raw Data)</option>
                        <option value="onchange" data-i18n="iobhistory.options.aggregate.onchange">On Change</option>
                        <option value="average" data-i18n="iobhistory.options.aggregate.average">Average</option>
                        <option value="min" data-i18n="iobhistory.options.aggregate.min">Minimum</option>
                        <option value="max" data-i18n="iobhistory.options.aggregate.max">Maximum</option>
                        <option value="minmax" data-i18n="iobhistory.options.aggregate.minmax">Min/Max Pairs</option>
                        <option value="total" data-i18n="iobhistory.options.aggregate.total">Total/Sum</option>
                        <option value="count" data-i18n="iobhistory.options.aggregate.count">Count</option>
                        <option value="percentile" data-i18n="iobhistory.options.aggregate.percentile">Percentile</option>
                        <option value="quantile" data-i18n="iobhistory.options.aggregate.quantile">Quantile</option>
                        <option value="integral" data-i18n="iobhistory.options.aggregate.integral">Integral</option>
                    </select>
                </div>
                
                <!-- Step Configuration -->
                <div class="form-row" id="step-config" style="display: none;">
                    <label for="node-input-step"><i class="icon-clock-o"></i> <span data-i18n="iobhistory.label.step">Step Interval</span></label>
                    <input type="number" id="node-input-step" style="width: 100px;" min="1">
                    <select id="node-input-stepUnit" style="width: 100px; margin-left: 5px;">
                        <option value="seconds" data-i18n="iobhistory.options.stepUnit.seconds">Seconds</option>
                        <option value="minutes" data-i18n="iobhistory.options.stepUnit.minutes">Minutes</option>
                        <option value="hours" data-i18n="iobhistory.options.stepUnit.hours">Hours</option>
                    </select>
                </div>
                
                <!-- Aggregation-specific options -->
                <div class="form-row aggregate-option" id="percentile-config" style="display: none;">
                    <label for="node-input-percentile"><i class="icon-tag"></i> <span data-i18n="iobhistory.label.percentile">Percentile</span></label>
                    <input type="number" id="node-input-percentile" style="width: 100px;" min="0" max="100" value="50">
                    <span style="margin-left: 5px; font-size: 12px; color: #666;" data-i18n="iobhistory.units.percent">% (0-100)</span>
                </div>
                
                <div class="form-row aggregate-option" id="quantile-config" style="display: none;">
                    <label for="node-input-quantile"><i class="icon-tag"></i> <span data-i18n="iobhistory.label.quantile">Quantile</span></label>
                    <input type="number" id="node-input-quantile" style="width: 100px;" min="0" max="1" step="0.01" value="0.5">
                    <span style="margin-left: 5px; font-size: 12px; color: #666;" data-i18n="iobhistory.units.decimal">(0-1)</span>
                </div>
                
                <div class="form-row aggregate-option" id="integral-config" style="display: none;">
                    <label for="node-input-integralUnit"><i class="icon-tag"></i> <span data-i18n="iobhistory.label.integralUnit">Integral Unit</span></label>
                    <select id="node-input-integralUnit" style="width: 150px;">
                        <option value="1" data-i18n="iobhistory.options.integralUnit.seconds">Seconds</option>
                        <option value="60" data-i18n="iobhistory.options.integralUnit.minutes">Minutes</option>
                        <option value="3600" data-i18n="iobhistory.options.integralUnit.hours">Hours</option>
                        <option value="86400" data-i18n="iobhistory.options.integralUnit.days">Days</option>
                    </select>
                </div>
            </div>
            
            <div class="tab-section">
                <h4 data-i18n="iobhistory.sections.dataLimits">Data Limits</h4>
                <div class="form-row">
                    <label for="node-input-maxEntries"><i class="icon-list"></i> <span data-i18n="iobhistory.label.maxEntries">Max Entries</span></label>
                    <input type="number" id="node-input-maxEntries" style="width: 100px;" min="1" max="100000">
                    <span style="margin-left: 5px; font-size: 12px; color: #666;" data-i18n="iobhistory.units.default">Default: 2000</span>
                </div>
            </div>
        </div>

        <!-- Output Tab -->
        <div class="tab-pane" data-tab="output">
            <div class="tab-section">
                <h4 data-i18n="iobhistory.sections.outputConfig">Output Configuration</h4>
                <div class="form-row">
                    <label for="node-input-outputProperty"><i class="icon-tag"></i> <span data-i18n="iobhistory.label.outputProperty">Output Property</span></label>
                    <input type="text" id="node-input-outputProperty" data-i18n="[placeholder]iobhistory.placeholder.outputProperty" placeholder="payload">
                </div>
                
                <div class="form-row">
                    <label for="node-input-outputFormat"><i class="icon-list-alt"></i> <span data-i18n="iobhistory.label.outputFormat">Output Format</span></label>
                    <select id="node-input-outputFormat" style="width:100%">
                        <option value="array" data-i18n="iobhistory.options.outputFormat.array">Array of Data Points</option>
                        <option value="chart" data-i18n="iobhistory.options.outputFormat.chart">Chart.js Format</option>
                        <option value="dashboard2" data-i18n="iobhistory.options.outputFormat.dashboard2">Dashboard 2.0 Format</option>
                        <option value="statistics" data-i18n="iobhistory.options.outputFormat.statistics">Statistics Summary</option>
                    </select>
                </div>
            </div>
            
            <!-- Output Format Information -->
            <div class="output-format-info array" style="display: none;">
                <i class="fa fa-info-circle"></i> <strong>Array Format:</strong> <span data-i18n="iobhistory.info.outputFormat.array">Returns raw data points as array: [{val, ts, ack, from}, ...]</span>
            </div>
            
            <div class="output-format-info chart" style="display: none;">
                <i class="fa fa-info-circle"></i> <strong>Chart.js Format:</strong> <span data-i18n="iobhistory.info.outputFormat.chart">Returns Chart.js dataset: {labels: [], datasets: [{data: [], label: ""}]}</span>
            </div>
            
            <div class="output-format-info dashboard2" style="display: none;">
                <i class="fa fa-info-circle"></i> <strong>Dashboard 2.0 Format:</strong> <span data-i18n="iobhistory.info.outputFormat.dashboard2">Returns ui-chart compatible data: [{x: timestamp, y: value}, ...] with msg.topic as series name. Configure ui-chart: X="x", Y="y"</span>
            </div>
            
            <div class="output-format-info statistics" style="display: none;">
                <i class="fa fa-info-circle"></i> <strong>Statistics Format:</strong> <span data-i18n="iobhistory.info.outputFormat.statistics">Returns summary: {count, min, max, avg, first, last, timeRange}</span>
            </div>
        </div>
    </div>
</script>
