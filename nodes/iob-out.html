<script type="text/javascript">
function loadSharedTreeView() {
    return new Promise((resolve, reject) => {
        if (window.ioBrokerSharedTreeView && window.ioBrokerSharedTreeView.initialized) {
            resolve();
            return;
        }
        
        const script = document.createElement('script');
        script.src = 'iobroker/shared/iobroker-treeview.js?v=1.0.0';
        script.async = true;
        
        script.onload = () => {
            if (window.ioBrokerSharedTreeView && window.ioBrokerSharedTreeView.initialized) {
                resolve();
            } else {
                reject(new Error('TreeView component failed to initialize'));
            }
        };
        
        script.onerror = () => {
            reject(new Error('TreeView component script not found'));
        };
        
        document.head.appendChild(script);
    });
}

RED.nodes.registerType('iobout', {
    category: 'ioBroker WS',
    color: '#a6bbcf',
    defaults: {
        name: { value: "" },
        state: { value: "" },
        inputProperty: { value: "payload" },
        setMode: { value: "value" },
        autoCreate: { value: false },
        stateName: { value: "" },
        stateRole: { value: "" },
        payloadType: { value: "" },
        stateReadonly: { value: "" },
        stateUnit: { value: "" },
        stateMin: { value: "" },
        stateMax: { value: "" },
        server: { value: "", type: "iob-config" }
    },
    inputs: 1,
    outputs: 0,
    icon: "iobroker_out.svg",
    paletteLabel: "WS ioB out",
    label: function() {
        return this.name || "iob-out";
    },
    
    oneditprepare: function() {
        const serverInput = $('#node-input-server');
        
        if (!this.server || this.server === '') {
            const configNodes = [];
            RED.nodes.eachConfig(function(config) {
                if (config.type === 'iob-config') {
                    configNodes.push(config);
                }
            });
            
            if (configNodes.length === 1) {
                this.server = configNodes[0].id;
                serverInput.val(this.server);
                
                setTimeout(() => {
                    RED.notify("Auto-selected server: " + (configNodes[0].name || configNodes[0].iobhost), {
                        type: "info",
                        timeout: 1500
                    });
                }, 500);
            }
        }
        
        $('#node-input-autoCreate').on('change', function() {
            const isChecked = $(this).prop('checked');
            $('.object-creation-fields').toggle(isChecked);
            
            if (isChecked) {
                $('#auto-create-info').show();
            } else {
                $('#auto-create-info').hide();
            }
        });
        
        const autoCreateChecked = $('#node-input-autoCreate').prop('checked');
        $('.object-creation-fields').toggle(autoCreateChecked);
        $('#auto-create-info').toggle(autoCreateChecked);
        
        loadSharedTreeView().then(() => {
            this.treeController = window.ioBrokerSharedTreeView.setup({
                nodeType: 'iobout',
                inputId: 'node-input-state',
                serverInputId: 'node-input-server',
                searchPlaceholder: 'Search states (hierarchical filtering)...',
                itemType: 'states',
                dataEndpoint: '/iobroker/ws/states',
                enableWildcardDetection: false
            });
        }).catch(error => {
            const fallbackMessage = $(`
                <div style="margin-top: 5px; padding: 8px; background-color: #fff3cd; border: 1px solid #ffeaa7; border-radius: 4px; font-size: 12px; color: #856404;">
                    <i class="fa fa-exclamation-triangle"></i> TreeView component not available. Manual input only.
                </div>
            `);
            $('#node-input-state').after(fallbackMessage);
        });
    },

    oneditsave: function() {
        if (this.treeController) {
            this.treeController.cleanup();
        }
    }
});
</script>

    </div>
    
    <div class="form-row">
        <label for="node-input-inputProperty"><i class="icon-tag"></i> <span data-i18n="iobout.label.inputProperty">Input Property</span></label>

        </div>
        
        <div class="form-row">
            <label for="node-input-payloadType"><i class="icon-tag"></i> <span data-i18n="iobout.label.payloadType">Payload Type</span></label>
            <select id="node-input-payloadType" style="width:100%">
                <option value="" data-i18n="iobout.options.payloadType.auto">Auto-detect (or use msg.payloadType)</option>
                <option value="boolean" data-i18n="iobout.options.payloadType.boolean">Boolean</option>
                <option value="number" data-i18n="iobout.options.payloadType.number">Number</option>
                <option value="string" data-i18n="iobout.options.payloadType.string">String</option>
                <option value="object" data-i18n="iobout.options.payloadType.object">Object</option>
                <option value="array" data-i18n="iobout.options.payloadType.array">Array</option>
                <option value="file" data-i18n="iobout.options.payloadType.file">File</option>
                <option value="mixed" data-i18n="iobout.options.payloadType.mixed">Mixed</option>
            </select>
        </div>
        
        <div class="form-row">
            <label for="node-input-stateReadonly"><i class="icon-tag"></i> <span data-i18n="iobout.label.stateReadonly">Readonly</span></label>
            <select id="node-input-stateReadonly" style="width:100%">
                <option value="" data-i18n="iobout.options.stateReadonly.default">Default: Writable (or use msg.stateReadonly)</option>
                <option value="false" data-i18n="iobout.options.stateReadonly.writable">Writable</option>
                <option value="true" data-i18n="iobout.options.stateReadonly.readonly">Read-only</option>

        <div class="form-row">
            <label for="node-input-stateUnit"><i class="icon-tag"></i> <span data-i18n="iobout.label.stateUnit">Unit</span></label>

        </div>
        
        <div class="form-row">
            <label for="node-input-stateMin"><i class="icon-tag"></i> <span data-i18n="iobout.label.stateMin">Min</span></label>
            <input type="number" id="node-input-stateMin" data-i18n="[placeholder]iobout.placeholder.stateMin" placeholder="Minimum value - Leave empty to use msg.stateMin">

        <div class="form-row">
            <label for="node-input-stateMax"><i class="icon-tag"></i> <span data-i18n="iobout.label.stateMax">Max</span></label>
            <input type="number" id="node-input-stateMax" data-i18n="[placeholder]iobout.placeholder.stateMax" placeholder="Maximum value - Leave empty to use msg.stateMax">

    </div>
    
    <div class="form-row">
        <label for="node-input-server"><i class="icon-tag"></i> <span data-i18n="iobout.label.server">Server</span></label>

<script type="text/html" data-help-name="iobout">
    <p data-i18n="iobout.help.description">ioBroker state output via WebSocket with optional automatic object creation capability.</p>
    
    <h3 data-i18n="iobout.help.basicConfiguration">Basic Configuration</h3>
    <ul>
        <li><b data-i18n="iobout.label.state">State</b>: <span data-i18n="iobout.help.stateDescription">The ioBroker state ID. If empty, msg.topic is used.</span></li>
        <li><b data-i18n="iobout.label.inputProperty">Input Property</b>: <span data-i18n="iobout.help.inputPropertyDescription">The message property containing the value to set (default: payload).</span></li>
        <li><b data-i18n="iobout.label.setMode">Set Mode</b>: <span data-i18n="iobout.help.setModeDescription">Value (ack=true): Sets the state as a confirmed value. Command (ack=false): Sets the state as a command for devices.</span></li>
        <li><b data-i18n="iobout.label.server">Server</b>: <span data-i18n="iobout.help.serverDescription">The ioBroker server configuration</span></li>
    </ul>
    
    <h3 data-i18n="iobout.help.autoCreateTitle">Auto-Create Objects</h3>
    <p data-i18n="iobout.help.autoCreateDescription">When enabled, this node will automatically create missing ioBroker objects before setting their values.</p>
    
    <h4 data-i18n="iobout.help.configurationMethods">Configuration Methods</h4>
    <ul>
        <li><b data-i18n="iobout.help.staticConfiguration">Static Configuration</b>: <span data-i18n="iobout.help.staticConfigurationDescription">Set object properties in the node configuration</span></li>
        <li><b data-i18n="iobout.help.dynamicConfiguration">Dynamic via Message</b>: <span data-i18n="iobout.help.dynamicConfigurationDescription">Override properties using message properties (msg.stateName, msg.stateRole, etc.)</span></li>
    </ul>
</script>
