<script type="text/javascript">
// Shared TreeView loader with robust error handling
function loadSharedTreeView() {
    return new Promise((resolve, reject) => {
        if (window.ioBrokerSharedTreeView && window.ioBrokerSharedTreeView.initialized) {
            resolve();
            return;
        }
        
        const script = document.createElement('script');
        script.src = 'iobroker/shared/iobroker-treeview.js?v=1.0.0';
        script.async = true;
        
        script.onload = () => {
            if (window.ioBrokerSharedTreeView && window.ioBrokerSharedTreeView.initialized) {
                console.log('TreeView component loaded successfully');
                resolve();
            } else {
                reject(new Error('TreeView component failed to initialize'));
            }
        };
        
        script.onerror = () => {
            console.error('TreeView component script not found');
            reject(new Error('TreeView component script not found'));
        };
        
        document.head.appendChild(script);
    });
}

RED.nodes.registerType('iobgetobject', {
    category: 'ioBroker WS',
    color: '#a6bbcf',
    defaults: {
        name: { value: "" },
        objectId: { 
            value: "",
            validate: function(v) {
                if (this.inputMode === 'single') {
                    return v && v.trim().length > 0;
                }
                return true;
            }
        },
        outputProperty: { value: "payload" },
        outputMode: { value: "single" },
        objectType: { value: "" },
        useWildcard: { value: false },
        includeEnums: { value: false },
        enumTypes: { value: "all" },
        server: { value: "", type: "iob-config" }
    },
    inputs: 1,
    outputs: 1,
    icon: "iobroker_getobject.svg",
    paletteLabel: "WS ioB getObj",
    label: function() {
        if (this.name) return this.name;
        
        let label = this.objectId || "iob-getobject";
        if (this.objectId && this.objectId.includes('*')) {
            label = `${this.objectId} (pattern)`;
        }
        if (this.includeEnums) {
            label += " +enums";
        }
        return label;
    },
    
    oneditprepare: function() {
        const node = this;
        const serverInput = $('#node-input-server');
        
        if (!this.server || this.server === '') {
            const configNodes = [];
            RED.nodes.eachConfig(function(config) {
                if (config.type === 'iob-config') {
                    configNodes.push(config);
                }
            });
            
            if (configNodes.length === 1) {
                this.server = configNodes[0].id;
                serverInput.val(this.server);
                
                setTimeout(() => {
                    RED.notify(`Automatically selected server: ${configNodes[0].name || configNodes[0].iobhost}`, {
                        type: "info",
                        timeout: 1500
                    });
                }, 500);
            }
        }
        
        $('#node-input-objectType').on('change', function() {
            const objectType = $(this).val();
            
            if (objectType === 'enum') {
                const currentPattern = $('#node-input-objectId').val().trim();
                if (!currentPattern || !currentPattern.startsWith('enum.')) {
                    $('#node-input-objectId').val('enum.*');
                    $('input[name="enumQuickSelect"][value="enum.*"]').prop('checked', true);
                }
            }
        });
        
        $('input[name="enumQuickSelect"]').on('change', function() {
            const selectedValue = $(this).val();
            if (selectedValue !== 'custom') {
                $('#node-input-objectId').val(selectedValue);
            } else {
                $('#node-input-objectId').focus();
            }
        });
        
        $('#node-input-objectId').on('input', function() {
            const pattern = $(this).val().trim();
            
            if ($('#node-input-objectType').val() === 'enum') {
                const enumRadios = $('input[name="enumQuickSelect"]');
                let matched = false;
                
                enumRadios.each(function() {
                    if ($(this).val() === pattern) {
                        $(this).prop('checked', true);
                        matched = true;
                        return false;
                    }
                });
                
                if (!matched) {
                    $('input[name="enumQuickSelect"][value="custom"]').prop('checked', true);
                }
            }
        });
        
        $('#node-input-includeEnums').on('change', function() {
            const isChecked = $(this).prop('checked');
            $('#enum-options').toggle(isChecked);
            $('#enum-assignment-info').toggle(isChecked);
            
            validatePatternCompatibility();
        });
        
        const includeEnumsChecked = $('#node-input-includeEnums').prop('checked');
        $('#enum-options').toggle(includeEnumsChecked);
        $('#enum-assignment-info').toggle(includeEnumsChecked);
        
        $('#node-input-outputMode').on('change', function() {
            const outputMode = $(this).val();
            $('.output-mode-info').hide();
            $(`.output-mode-info.${outputMode}`).show();
            
            validatePatternCompatibility();
        });
        
        $('#node-input-objectId').on('input keyup change', function() {
            validatePatternCompatibility();
        });
        
        function validatePatternCompatibility() {
            const objectId = $('#node-input-objectId').val().trim();
            const outputMode = $('#node-input-outputMode').val();
            const includeEnums = $('#node-input-includeEnums').prop('checked');
            const isPattern = objectId.includes('*');
            
            $('#pattern-validation-warning').remove();
            
            let warningMessage = '';
            let warningType = '';
            
            if (isPattern && outputMode === 'single') {
                warningMessage = '<strong>Warning:</strong> Wildcard pattern detected but "Single Object" mode selected. This will return only the first matching object. Consider using "Array" or "Object Map" mode.';
                warningType = 'warning';
            } else if (!isPattern && (outputMode === 'array' || outputMode === 'object')) {
                warningMessage = '<strong>Info:</strong> Single object ID with "' + (outputMode === 'array' ? 'Array' : 'Object Map') + '" mode. The result will be wrapped in an ' + (outputMode === 'array' ? 'array' : 'object') + '.';
                warningType = 'info';
            }
            

            
            if (warningMessage) {
                const warningClass = warningType === 'warning' ? 'warning' : 'info';
                const iconClass = warningType === 'warning' ? 'fa-exclamation-triangle' : 'fa-info-circle';
                const warningDiv = $(`
                    <div id="pattern-validation-warning" style="margin-top: 8px; padding: 8px; background-color: ${warningType === 'warning' ? '#fff3cd' : '#d1ecf1'}; border: 1px solid ${warningType === 'warning' ? '#ffeaa7' : '#bee5eb'}; border-radius: 4px; font-size: 12px; color: ${warningType === 'warning' ? '#856404' : '#0c5460'};">
                        <i class="fa ${iconClass}"></i> ${warningMessage}
                    </div>
                `);
                $('#node-input-outputMode').closest('.form-row').after(warningDiv);
            }
        }
        
        const currentOutputMode = $('#node-input-outputMode').val() || 'single';
        $('.output-mode-info').hide();
        $(`.output-mode-info.${currentOutputMode}`).show();
        
        const currentObjectType = $('#node-input-objectType').val();
        if (currentObjectType === 'enum') {
            const currentPattern = $('#node-input-objectId').val().trim();
            if (currentPattern) {
                const matchingRadio = $(`input[name="enumQuickSelect"][value="${currentPattern}"]`);
                if (matchingRadio.length) {
                    matchingRadio.prop('checked', true);
                } else {
                    $('input[name="enumQuickSelect"][value="custom"]').prop('checked', true);
                }
            }
        }
        
        loadSharedTreeView().then(() => {
            this.treeController = window.ioBrokerSharedTreeView.setup({
                nodeType: 'iobgetobject',
                inputId: 'node-input-objectId',
                serverInputId: 'node-input-server',
                searchPlaceholder: 'Search objects (supports wildcards)...',
                itemType: 'objects',
                dataEndpoint: '/iobroker/ws/states',
                enableWildcardDetection: true,
                wildcardInputId: null
            });
        }).catch(error => {
            console.error('Failed to load TreeView component:', error);
            
            const fallbackMessage = $(`
                <div style="margin-top: 5px; padding: 8px; background-color: #fff3cd; border: 1px solid #ffeaa7; border-radius: 4px; font-size: 12px; color: #856404;">
                    <i class="fa fa-exclamation-triangle"></i> TreeView component not available. Manual input with wildcard detection.
                </div>
            `);
            $('#node-input-objectId').after(fallbackMessage);
            
            $('#node-input-objectId').on('input keyup change', function() {
                const pattern = $(this).val();
                const hasWildcardChars = pattern.includes('*');
                
                if (hasWildcardChars) {
                    let wildcardWarning = $('#basic-wildcard-warning-getobj');
                    if (wildcardWarning.length === 0) {
                        wildcardWarning = $(`
                            <div id="basic-wildcard-warning-getobj" style="margin-top: 5px; padding: 8px; background-color: #e8f4fd; border: 1px solid #bee5eb; border-radius: 4px; font-size: 12px; color: #0c5460;">
                                <i class="fa fa-info-circle"></i> Wildcard pattern detected - will return multiple objects.
                            </div>
                        `);
                        $(this).after(wildcardWarning);
                    }
                    wildcardWarning.show();
                } else {
                    $('#basic-wildcard-warning-getobj').hide();
                }
            });
        });
        
        setTimeout(() => {
            validatePatternCompatibility();
        }, 100);
    },

    oneditsave: function() {
        const objectIdValue = $('#node-input-objectId').val();
        const hasWildcardChars = objectIdValue.includes('*');
        
        this.useWildcard = hasWildcardChars;
        
        const currentOutputMode = $('#node-input-outputMode').val();
        if (hasWildcardChars && currentOutputMode === 'single') {
            if (typeof RED !== 'undefined' && RED.notify) {
                RED.notify('Warning: Wildcard pattern with Single Object mode will return only the first match', { 
                    type: "warning", 
                    timeout: 4000 
                });
            }
        }
        
        const objectType = $('#node-input-objectType').val();
        this.objectType = objectType;
        
        const includeEnums = $('#node-input-includeEnums').prop('checked');
        this.includeEnums = includeEnums;
        
        const enumTypes = $('#node-input-enumTypes').val();
        this.enumTypes = enumTypes;
        
        console.log('Saved configuration:', {
            objectId: objectIdValue,
            useWildcard: this.useWildcard,
            outputMode: currentOutputMode,
            objectType: this.objectType,
            includeEnums: this.includeEnums,
            enumTypes: this.enumTypes
        });
        
        if (this.treeController) {
            this.treeController.cleanup();
        }
    }
});
</script>

<script type="text/html" data-template-name="iobgetobject">
    <div class="form-row">
        <label for="node-input-name"><i class="icon-tag"></i> <span data-i18n="iobgetobject.label.name">Name</span></label>
        <input type="text" id="node-input-name" data-i18n="[placeholder]iobgetobject.placeholder.name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-objectId"><i class="icon-tag"></i> <span data-i18n="iobgetobject.label.objectId">Object ID / Pattern</span></label>
        <input type="text" id="node-input-objectId" data-i18n="[placeholder]iobgetobject.placeholder.objectId" placeholder="e.g. system.adapter.admin.0 or system.adapter.* (if empty, msg.topic is used)">
    </div>
    <div class="form-row">
        <label for="node-input-outputProperty"><i class="icon-tag"></i> <span data-i18n="iobgetobject.label.outputProperty">Output Property</span></label>
        <input type="text" id="node-input-outputProperty" data-i18n="[placeholder]iobgetobject.placeholder.outputProperty" placeholder="e.g. payload">
    </div>
    <div class="form-row">
        <label for="node-input-outputMode"><i class="icon-tag"></i> <span data-i18n="iobgetobject.label.outputMode">Output Mode</span></label>
        <select id="node-input-outputMode" style="width:100%">
            <option value="single" data-i18n="iobgetobject.options.outputMode.single">Single Object (for single object IDs)</option>
            <option value="array" data-i18n="iobgetobject.options.outputMode.array">Array of Objects (for wildcard patterns)</option>
            <option value="object" data-i18n="iobgetobject.options.outputMode.object">Object Map (objectId → object)</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-objectType"><i class="icon-tag"></i> <span data-i18n="iobgetobject.label.objectType">Object Type Filter</span></label>
        <select id="node-input-objectType" style="width:100%">
            <option value="" data-i18n="iobgetobject.options.objectType.all">All Types</option>
            <option value="state" data-i18n="iobgetobject.options.objectType.state">State</option>
            <option value="channel" data-i18n="iobgetobject.options.objectType.channel">Channel</option>
            <option value="device" data-i18n="iobgetobject.options.objectType.device">Device</option>
            <option value="folder" data-i18n="iobgetobject.options.objectType.folder">Folder</option>
            <option value="adapter" data-i18n="iobgetobject.options.objectType.adapter">Adapter</option>
            <option value="instance" data-i18n="iobgetobject.options.objectType.instance">Instance</option>
            <option value="host" data-i18n="iobgetobject.options.objectType.host">Host</option>
            <option value="group" data-i18n="iobgetobject.options.objectType.group">Group</option>
            <option value="user" data-i18n="iobgetobject.options.objectType.user">User</option>
            <option value="config" data-i18n="iobgetobject.options.objectType.config">Config</option>
            <option value="enum" data-i18n="iobgetobject.options.objectType.enum">Enum</option>
        </select>
    </div>
    
    <div class="form-row">
        <label for="node-input-includeEnums" style="width: auto;">
            <input type="checkbox" id="node-input-includeEnums" style="width: auto; margin-right: 5px;">
            <i class="icon-tag"></i> <span data-i18n="iobgetobject.label.includeEnums">Include assigned Enums</span>
        </label>
    </div>
    
    <div id="enum-assignment-info" style="display: none; margin-top: 5px; padding: 8px; background-color: #e8f4fd; border: 1px solid #bee5eb; border-radius: 4px; font-size: 12px; color: #0c5460;">
        <i class="fa fa-info-circle"></i> <strong data-i18n="iobgetobject.info.enumAssignment">Enum Assignment:</strong><br>
        <span data-i18n="iobgetobject.info.enumAssignmentDescription">Each returned object will include an enumAssignments property containing:</span>
        <ul style="margin: 5px 0 0 20px; padding: 0;">
            <li><code>rooms</code> - <span data-i18n="iobgetobject.info.enumAssignmentList.0">Array of assigned room enums</span></li>
            <li><code>functions</code> - <span data-i18n="iobgetobject.info.enumAssignmentList.1">Array of assigned function enums</span></li>
            <li><code>other</code> - <span data-i18n="iobgetobject.info.enumAssignmentList.2">Array of other enum assignments</span></li>
            <li><code>totalEnums</code> - <span data-i18n="iobgetobject.info.enumAssignmentList.3">Total number of enum assignments</span></li>
            <li><code>roomName</code>, <code>functionName</code> - <span data-i18n="iobgetobject.info.enumAssignmentList.4">Convenience properties</span></li>
        </ul>
        <strong data-i18n="iobgetobject.info.enumNote">Note:</strong> <span data-i18n="iobgetobject.info.enumNoteDescription">This feature requires additional queries and may increase response time.</span>
    </div>
    
    <div id="enum-options" style="display: none;">
        <div class="form-row">
            <label for="node-input-enumTypes"><i class="icon-tag"></i> <span data-i18n="iobgetobject.label.enumTypes">Enum Types</span></label>
            <select id="node-input-enumTypes" style="width:100%">
                <option value="all" data-i18n="iobgetobject.options.enumTypes.all">All Types (rooms, functions, custom)</option>
                <option value="rooms" data-i18n="iobgetobject.options.enumTypes.rooms">Rooms only</option>
                <option value="functions" data-i18n="iobgetobject.options.enumTypes.functions">Functions only</option>
                <option value="rooms,functions" data-i18n="iobgetobject.options.enumTypes.roomsAndFunctions">Rooms and Functions</option>
            </select>
        </div>
    </div>
     
    <div class="form-row">
        <label for="node-input-server"><i class="icon-tag"></i> <span data-i18n="iobgetobject.label.server">Server</span></label>
        <input type="text" id="node-input-server">
    </div>
</script>

<script type="text/html" data-help-name="iobgetobject">
    <p data-i18n="iobgetobject.help.description">ioBroker object retrieval via WebSocket with wildcard pattern support and optional enum assignments</p>
    
    <h3 data-i18n="iobgetobject.help.inputModes">Input Modes</h3>
    <ul>
        <li><b data-i18n="iobgetobject.help.singleObject">Single Object:</b> <span data-i18n="iobgetobject.help.singleObjectDescription">Retrieve one specific object by ID</span></li>
        <li><b data-i18n="iobgetobject.help.wildcardPattern">Wildcard Pattern:</b> <span data-i18n="iobgetobject.help.wildcardPatternDescription">Retrieve multiple objects matching a pattern (auto-detected when * is present)</span></li>
    </ul>
    
    <h3 data-i18n="iobgetobject.help.configuration">Configuration</h3>
    <ul>
        <li><b data-i18n="iobgetobject.label.objectId">Object ID / Pattern:</b> <span data-i18n="iobgetobject.help.objectIdDescription">The ioBroker object identifier or wildcard pattern. If empty, msg.topic is used as the object ID.</span></li>
        <li><b data-i18n="iobgetobject.label.outputProperty">Output Property:</b> <span data-i18n="iobgetobject.help.outputPropertyDescription">The message property to store the object data (default: payload).</span></li>
        <li><b data-i18n="iobgetobject.label.outputMode">Output Mode:</b> <span data-i18n="iobgetobject.help.outputModeDescription">How to format the output</span></li>
        <li><b data-i18n="iobgetobject.label.objectType">Object Type Filter:</b> <span data-i18n="iobgetobject.help.objectTypeDescription">Filter objects by type (state, channel, device, etc.). Leave empty to include all types.</span></li>
        <li><b data-i18n="iobgetobject.label.includeEnums">Include assigned Enums:</b> <span data-i18n="iobgetobject.help.includeEnumsDescription">Automatically adds enum assignment information to each object.</span></li>
        <li><b data-i18n="iobgetobject.label.enumTypes">Enum Types:</b> <span data-i18n="iobgetobject.help.enumTypesDescription">Filter which enum types to include (all, rooms only, functions only, etc.).</span></li>
        <li><b data-i18n="iobgetobject.label.server">Server:</b> <span data-i18n="iobgetobject.help.serverDescription">The ioBroker server configuration.</span></li>
    </ul>
</script>
