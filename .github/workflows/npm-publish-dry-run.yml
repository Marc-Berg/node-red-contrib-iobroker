name: NPM Publish Dry Run

on:
  workflow_dispatch:

jobs:
  dry-run:
    if: ${{ github.ref == 'refs/heads/chore/npm-publish-hardening' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Validate allowed branch
        run: |
          echo "Workflow ref: ${GITHUB_REF}"
          if [ "${GITHUB_REF}" != "refs/heads/chore/npm-publish-hardening" ] && [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "❌ Branch not allowed for dry-run workflow"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show package content (dry-run)
        run: npm pack --dry-run

      - name: Simulate npm publish with trusted publishing (dry-run)
        run: |
          echo "🧪 Running npm publish --dry-run --provenance"
          npm publish --dry-run --provenance